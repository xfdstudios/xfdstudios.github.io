<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Article — XFD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
      .article-main {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }
      .article-back {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        color: var(--accent, #00e5ff);
        text-decoration: none;
        margin-bottom: 2rem;
        font-size: .8rem;
        letter-spacing: .1em;
        text-transform: uppercase;
        opacity: .8;
        transition: opacity .2s;
      }
      .article-back:hover { opacity: 1; }
      .article-head { margin-bottom: 2rem; }
      .article-head h1 {
        font-size: clamp(1.6rem, 4vw, 2.6rem);
        line-height: 1.2;
        margin: .5rem 0 1rem;
      }
      .article-head .meta {
        font-size: .8rem;
        letter-spacing: .1em;
        text-transform: uppercase;
        opacity: .6;
      }
      .article-video-wrap {
        position: relative;
        width: 100%;
        max-width: 560px;
        margin: 0 auto 2.5rem;
        border-radius: 10px;
        overflow: hidden;
        aspect-ratio: 9 / 16;
        background: #111;
      }
      .article-video-wrap iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .article-body {
        font-size: 1.05rem;
        line-height: 1.85;
        color: var(--text-secondary, rgba(255,255,255,.75));
      }
      .article-body p { margin-bottom: 1.4rem; }
      .article-divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,.1);
        margin: 3rem 0;
      }
      .article-watch-btn {
        display: inline-flex;
        align-items: center;
        gap: .6rem;
        background: #ff0000;
        color: #fff;
        text-decoration: none;
        padding: .75rem 1.5rem;
        border-radius: 6px;
        font-size: .9rem;
        font-weight: 600;
        margin-bottom: 2.5rem;
        transition: opacity .2s;
      }
      .article-watch-btn:hover { opacity: .85; }
      .article-thread-btn {
        display: inline-flex;
        align-items: center;
        gap: .6rem;
        background: #0a0a0f;
        border: 1px solid rgba(255, 255, 255, .25);
        color: #fff;
        text-decoration: none;
        padding: .75rem 1.5rem;
        border-radius: 6px;
        font-size: .9rem;
        font-weight: 600;
        margin-bottom: 2.5rem;
        transition: opacity .2s;
      }
      .article-thread-btn:hover { opacity: .85; }
      .article-watch-btn[hidden],
      .article-thread-btn[hidden] { display: none; }
    </style>
  </head>
  <body class="page-news">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="XenoFinalDawn home">
        <img src="assets/NEW%20LOGO.png" alt="XFD logo">
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html"><i class="fa-solid fa-newspaper" aria-hidden="true"></i>Feed</a>
        <a href="about.html"><i class="fa-solid fa-microchip" aria-hidden="true"></i>Origin</a>
        <a href="designs.html"><i class="fa-solid fa-pen-nib" aria-hidden="true"></i>Designs</a>
        <a href="contact.html"><i class="fa-solid fa-envelope" aria-hidden="true"></i>Contact</a>
      </nav>
      <div class="header-actions">
        <div class="social-links" aria-label="Social links">
          <a href="https://www.youtube.com/@Xenofinaldawn" aria-label="YouTube">
            <i class="fa-brands fa-youtube" aria-hidden="true"></i>
          </a>
          <a href="https://www.facebook.com/XFDTV/" aria-label="Facebook">
            <i class="fa-brands fa-facebook" aria-hidden="true"></i>
          </a>
          <a href="https://www.tiktok.com/@xenofinaldawn" aria-label="TikTok">
            <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
          </a>
          <a href="https://www.instagram.com/xenofinaldawn/" aria-label="Instagram">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          </a>
          <a href="https://www.redbubble.com/people/Gr3at1/shop?asc=u" aria-label="Shop">
            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    </header>

    <main class="article-main">
      <a class="article-back" id="article-back-link" href="index.html">
        <i class="fa-solid fa-arrow-left"></i>
        <span id="article-back-label">Back to Portal</span>
      </a>

      <div class="article-head">
        <p class="eyebrow" id="article-portal-label">Portal</p>
        <h1 id="article-title">Loading...</h1>
        <p class="meta" id="article-meta"></p>
      </div>

      <div class="article-video-wrap" id="article-video-wrap" hidden>
        <iframe
          id="article-video-frame"
          allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        ></iframe>
      </div>

      <a class="article-watch-btn" id="article-watch-link" href="#" target="_blank" rel="noopener" hidden>
        <i class="fa-brands fa-youtube"></i>
        Watch on YouTube
      </a>

      <a class="article-thread-btn" id="article-thread-link" href="#" target="_blank" rel="noopener" hidden>
        <i class="fa-brands fa-threads"></i>
        Read more on Threads
      </a>

      <div class="article-body" id="article-body"></div>
    </main>

    <footer class="site-footer">
      <p>© 2026 XenoFinalDawn (XFD). All rights reserved.</p>
    </footer>

    <script>
      const portalInfo = {
        horror:     { label: 'Horror',       href: 'horror.html' },
        anime:      { label: 'Anime',         href: 'anime.html' },
        wrestling:  { label: 'Wrestling',     href: 'wrestling.html' },
        tech:       { label: 'Tech/Gaming',   href: 'tech-gaming.html' },
        popculture: { label: 'Pop Culture',   href: 'popculture.html' }
      };

      const THREADS_PROFILE = 'https://www.threads.com/@xenofinaldawn';

      function getVideoId(url) {
        if (!url) return null;
        const parts = url.split('/');
        return parts[parts.length - 1].split('?')[0];
      }

      async function loadArticle() {
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get('id');

        if (!articleId) {
          document.querySelector('#article-title').textContent = 'No article specified.';
          return;
        }

        const response = await fetch('articles.json');
        const articles = await response.json();
        const article = articles.find(a => a.id === articleId);

        if (!article) {
          document.querySelector('#article-title').textContent = 'Article not found.';
          return;
        }

        const portal = portalInfo[article.portal] || { label: article.portal, href: 'index.html' };

        document.title = `${article.title} — XFD`;

        const backLink = document.querySelector('#article-back-link');
        backLink.href = portal.href;
        document.querySelector('#article-back-label').textContent = `Back to ${portal.label}`;

        document.querySelector('#article-portal-label').textContent = portal.label;
        document.querySelector('#article-title').textContent = article.title;

        const date = new Date(`${article.date}T00:00:00`).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
        document.querySelector('#article-meta').textContent = `${article.type} // ${date}`;

        if (article.videoUrl) {
          const videoId = getVideoId(article.videoUrl);
          const frame = document.querySelector('#article-video-frame');
          frame.src = `https://www.youtube.com/embed/${videoId}?rel=0`;
          document.querySelector('#article-video-wrap').hidden = false;

          const watchLink = document.querySelector('#article-watch-link');
          watchLink.href = article.videoUrl;
          watchLink.hidden = false;
        } else {
          // Text/Threads posts (no video): link out to Threads instead.
          const threadLink = document.querySelector('#article-thread-link');
          threadLink.href = article.threadsUrl || THREADS_PROFILE;
          threadLink.hidden = false;
        }

        const bodyEl = document.querySelector('#article-body');
        const text = article.body || article.summary;
        bodyEl.innerHTML = text.split('\n\n').map(p => `<p>${p}</p>`).join('');
      }

      loadArticle();
    </script>
  </body>
</html>
