name: Refresh social feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh social-feed.json from YouTube
        run: python scripts/build_social_feed.py

      - name: Sync new YouTube videos into articles.json
        run: python scripts/sync_articles.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- social-feed.json articles.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "xfd-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add social-feed.json articles.json
          git commit -m "chore: sync YouTube feed + new article drafts"
          git push
