name: Sync Threads posts

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # run manually anytime from GitHub Actions tab

permissions:
  contents: write

concurrency:
  group: threads-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest Threads posts into social-feed.json
        env:
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          if [ -z "$THREADS_TOKEN" ]; then
            echo "THREADS_TOKEN secret not set — skipping Threads sync."
            exit 0
          fi
          python scripts/sync_threads.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- social-feed.json; then
            echo "No Threads changes to commit."
            exit 0
          fi
          git config user.name  "xfd-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add social-feed.json
          git commit -m "chore: sync Threads posts into social feed"
          git push
