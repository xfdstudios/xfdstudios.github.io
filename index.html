<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XENOFINALDAWN</title>
  <meta name="description" content="One portal. Infinite possibilities. The central hub for XENOFINALDAWN.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root { --dark: #0F0F13; --horror: #39FF14; --anime: #8A2BE2; --wrestling: #DC143C; --tech: #00FFFF; }
    body { background-color: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; }
    
    /* Header & Fighter Nav */
    header { text-align: center; padding: 40px 20px; }
    h1 { font-size: 3rem; margin: 0; }
    .tagline { font-style: italic; color: #888; margin-bottom: 30px; }
    
    .nav-grid { display: flex; justify-content: center; gap: 30px; list-style: none; padding: 0; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; transition: 0.3s; }
    .nav-btn:hover { transform: translateY(-5px); }
    .nav-btn img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid transparent; transition: 0.3s; }
    
    .nav-btn.horror img { border-color: var(--horror); box-shadow: 0 0 15px var(--horror); }
    .nav-btn.anime img { border-color: var(--anime); box-shadow: 0 0 15px var(--anime); }
    .nav-btn.wrestling img { border-color: var(--wrestling); box-shadow: 0 0 15px var(--wrestling); }
    .nav-btn.tech img { border-color: var(--tech); box-shadow: 0 0 15px var(--tech); }

    /* Editorial Feed */
    .feed-container { max-width: 900px; margin: 40px auto; padding: 20px; }
    .article-card { background: #1a1a20; padding: 20px; margin-bottom: 20px; border-left: 5px solid; border-radius: 4px; }
    .horror-border { border-color: var(--horror); }
    .anime-border { border-color: var(--anime); }
    .wrestling-border { border-color: var(--wrestling); }
    .tech-border { border-color: var(--tech); }
  </style>
</head>
<body>

  <header>
    <h1>XENOFINALDAWN</h1>
    <p class="tagline">One portal. Infinite possibilities.</p>
    
    <nav>
      <ul class="nav-grid">
        <li><a href="index.html" class="nav-btn horror"><img src="assets/avatar.10252441.140x140.jpg" alt="News"><span>XFD NEWS</span></a></li>
        <li><a href="about.html" class="nav-btn anime"><img src="assets/avatar.10252441.140x140.jpg" alt="Origin"><span>ORIGIN</span></a></li>
        <li><a href="design-shop.html" class="nav-btn wrestling"><img src="assets/avatar.10252441.140x140.jpg" alt="Designs"><span>DESIGNS</span></a></li>
        <li><a href="contact.html" class="nav-btn tech"><img src="assets/avatar.10252441.140x140.jpg" alt="Contact"><span>CONTACT</span></a></li>
      </ul>
    </nav>
  </header>

  <main class="feed-container">
    <h2>Automated Media Desk</h2>
    <div id="youtube-feed" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
      <!-- Dynamic JS Content -->
    </div>

    <h2>The Uncut Feed</h2>
    <article class="article-card wrestling-border">
      <h3>AEW Storyline Breakdown</h3>
      <p>Uncensored thoughts on the latest title picture...</p>
    </article>
  </main>

  <script>
    async function fetchYouTubeVideos() {
      const channelId = "UCYOUR_CHANNEL_ID_HERE";
      if (channelId === "UCYOUR_CHANNEL_ID_HERE") return;
      const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
      const response = await fetch(apiUrl);
      const data = await response.json();
      const feed = document.getElementById('youtube-feed');
      data.items.slice(0, 3).forEach(v => {
        feed.innerHTML += `<div style="background:#1a1a20; padding:10px;">
          <img src="${v.thumbnail}" style="width:100%"><p>${v.title}</p>
          <a href="${v.link}" target="_blank">Watch</a></div>`;
      });
    }
    fetchYouTubeVideos();
  </script>
</body>
</html>
