<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root { --dark: #0F0F13; --horror: #39FF14; --anime: #8A2BE2; --wrestling: #DC143C; --tech: #00FFFF; --fb: #1877F2; }
    body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; }

    /* Centered Header & Nav */
    .site-logo { max-width: 120px; display: block; margin: 0 auto; }
    .nav-grid { display: flex; justify-content: center; gap: 30px; list-style: none; padding: 20px; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; }
    .nav-btn img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent; transition: 0.3s; }
    
    /* Neon Glows for Nav */
    .news img { border-color: var(--tech); box-shadow: 0 0 15px var(--tech); }
    .origin img { border-color: var(--anime); box-shadow: 0 0 15px var(--anime); }
    .designs img { border-color: var(--wrestling); box-shadow: 0 0 15px var(--wrestling); }
    .contact img { border-color: var(--horror); box-shadow: 0 0 15px var(--horror); }

    /* Expandable Sections */
    section { margin-bottom: 30px; padding: 20px; border: 1px solid #222; border-radius: 10px; }
    
    /* Neon Social Footer */
    .social-terminal { text-align: center; padding: 30px; font-size: 1.5rem; }
    .social-terminal a { margin: 0 15px; color: #555; transition: 0.3s; }
    .yt:hover { color: #FF0000; text-shadow: 0 0 15px #FF0000; }
    .tt:hover { color: #00F2EA; text-shadow: 0 0 15px #00F2EA; }
    .ig:hover { color: #FF00AF; text-shadow: 0 0 15px #FF00AF; }
    .fb:hover { color: var(--fb); text-shadow: 0 0 15px var(--fb); }
  </style>
</head>
<body>

  <header style="text-align:center;">
    <a href="index.html"><img src="assets/NEW%20LOGO.png" class="site-logo"></a>
    <h1>XENOFINALDAWN</h1>
    <p><i>One portal. Infinite possibilities.</i></p>
    
    <nav>
      <ul class="nav-grid">
        <li><a href="index.html" class="nav-btn news"><img src="assets/avatar.10252441.140x140.jpg"><span>NEWS</span></a></li>
        <li><a href="about.html" class="nav-btn origin"><img src="assets/avatar.10252441.140x140.jpg"><span>ORIGIN</span></a></li>
        <li><a href="designs.html" class="nav-btn designs"><img src="assets/avatar.10252441.140x140.jpg"><span>DESIGNS</span></a></li>
        <li><a href="contact.html" class="nav-btn contact"><img src="assets/avatar.10252441.140x140.jpg"><span>CONTACT</span></a></li>
      </ul>
    </nav>
  </header>

  <main style="max-width: 900px; margin: auto;">
    <section>
      <h2>THE TRANSMISSION HUB</h2>
      <div id="youtube-feed">Loading...</div>
    </section>

    <section>
      <h2>THE FINAL WORD</h2>
      <!-- (Tab code remains same as previous step) -->
    </section>

    <div class="social-terminal">
      <a href="#" class="yt"><i class="fab fa-youtube"></i></a>
      <a href="#" class="tt"><i class="fab fa-tiktok"></i></a>
      <a href="#" class="ig"><i class="fab fa-instagram"></i></a>
      <a href="#" class="fb"><i class="fab fa-facebook"></i></a>
    </div>
  </main>
</body>
</html>
