<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XENOFINALDAWN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root { --dark: #0F0F13; --horror: #39FF14; --anime: #8A2BE2; --wrestling: #DC143C; --tech: #00FFFF; }
    body { background-color: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; }

    /* The "Portal" Background Effect (CSS Generated, No Image) */
    .hero-portal { 
        height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, rgba(15,15,19,1) 70%);
        border-bottom: 1px solid #333;
    }

    /* Horizontal Nav Pill */
    .nav-pill { display: flex; justify-content: center; gap: 15px; padding: 20px; }
    .nav-btn { 
        background: #1a1a20; padding: 10px 20px; border-radius: 50px; border: 1px solid #444; 
        text-decoration: none; color: white; transition: 0.3s; 
    }
    .nav-btn:hover { border-color: var(--tech); box-shadow: 0 0 10px var(--tech); }

    /* Category Grid (4 Column) */
    .cat-grid { 
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
        gap: 20px; padding: 20px; max-width: 1000px; margin: auto;
    }
    .cat-card { 
        background: rgba(20,20,25,0.8); padding: 20px; border: 1px solid #333; 
        border-radius: 12px; transition: 0.3s;
    }
    .cat-card:hover { border-color: var(--tech); }
    .cat-card i { font-size: 2rem; margin-bottom: 15px; }

    /* Transmission Hub */
    .hub-section { padding: 40px 20px; max-width: 1000px; margin: auto; }
    .hub-slider { display: flex; gap: 20px; overflow-x: auto; }
    .card { flex: 0 0 280px; background: #1a1a20; padding: 15px; border-radius: 12px; }
  </style>
</head>
<body>

  <!-- Header/Nav -->
  <header>
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
          <img src="assets/NEW%20LOGO.png" style="width: 50px;">
          <nav class="nav-pill">
              <a href="#" class="nav-btn"><i class="fa fa-newspaper"></i> NEWS</a>
              <a href="#" class="nav-btn"><i class="fa fa-bolt"></i> ORIGIN</a>
              <a href="#" class="nav-btn"><i class="fa fa-pen"></i> DESIGNS</a>
              <a href="#" class="nav-btn"><i class="fa fa-envelope"></i> CONTACT</a>
          </nav>
          <div><i class="fa fa-search"></i> &nbsp; <i class="fa fa-user"></i></div>
      </div>
  </header>

  <!-- Hero Portal -->
  <section class="hero-portal">
      <h1 style="font-size: 4rem; letter-spacing: 5px; margin: 0;">XENOFINALDAWN</h1>
      <p style="font-style: italic; color: #888;">ONE PORTAL. INFINITE POSSIBILITIES.</p>
  </section>

  <!-- Hub -->
  <section class="hub-section">
      <h2>> THE TRANSMISSION HUB</h2>
      <div class="hub-slider" id="youtube-feed">Loading...</div>
  </section>

  <!-- Category Grid -->
  <section class="cat-grid">
      <div class="cat-card" style="border-left: 4px solid var(--horror);">
          <i class="fa fa-skull" style="color:var(--horror)"></i>
          <h3>HORROR</h3>
          <p>Enter the unknown.</p>
          <a href="#" style="color:var(--horror)">VIEW NEWS -></a>
      </div>
      <div class="cat-card" style="border-left: 4px solid var(--anime);">
          <i class="fa fa-sword" style="color:var(--anime)"></i>
          <h3>ANIME</h3>
          <p>Epic battles await.</p>
          <a href="#" style="color:var(--anime)">VIEW NEWS -></a>
      </div>
      <div class="cat-card" style="border-left: 4px solid var(--wrestling);">
          <i class="fa fa-hand-fist" style="color:var(--wrestling)"></i>
          <h3>WRESTLING</h3>
          <p>Champions collide.</p>
          <a href="#" style="color:var(--wrestling)">VIEW NEWS -></a>
      </div>
      <div class="cat-card" style="border-left: 4px solid var(--tech);">
          <i class="fa fa-gamepad" style="color:var(--tech)"></i>
          <h3>TECH/GAMING</h3>
          <p>Level up your world.</p>
          <a href="#" style="color:var(--tech)">VIEW NEWS -></a>
      </div>
  </section>

  <script>
      // Keep your existing fetchYouTubeVideos function here to populate the Hub
  </script>
</body>
</html>
