<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XENOFINALDAWN - CYBER TERMINAL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root { 
      --bg: #05050A; 
      --horror: #39FF14; 
      --anime: #8A2BE2; 
      --wrestling: #DC143C; 
      --tech: #00FFFF; 
      --fb: #1877F2;
      --grey-pill: rgba(255, 255, 255, 0.1);
    }
    
    body { 
      background-color: var(--bg); 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      overflow-x: hidden;
    }

    /* Phase 1: Control Center Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .site-logo { max-width: 100px; filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.5)); }

    /* Pill Navigation */
    .pill-nav {
      display: flex;
      gap: 15px;
    }
    .pill-nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 30px;
      background: var(--grey-pill);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pill-nav a:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

    /* Header Utilities (Search & Socials) */
    .header-utils {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .social-pills a {
      color: #aaa;
      font-size: 1.2rem;
      margin-left: 10px;
      transition: 0.3s;
    }
    .social-pills .yt:hover { color: #FF0000; text-shadow: 0 0 10px #FF0000; }
    .social-pills .fb:hover { color: var(--fb); text-shadow: 0 0 10px var(--fb); }
    .social-pills .tt:hover { color: var(--tech); text-shadow: 0 0 10px var(--tech); }
    .social-pills .ig:hover { color: #FF00AF; text-shadow: 0 0 10px #FF00AF; }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--grey-pill);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      padding: 8px 15px;
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      padding-right: 10px;
    }
    .search-bar input::placeholder { color: #aaa; }

    /* Phase 2: CSS Hero Portal Glow */
    .hero-portal {
      text-align: center;
      padding: 120px 20px;
      position: relative;
      /* CSS generated portal glow */
      background: radial-gradient(circle at 50% 50%, rgba(138,43,226,0.35) 0%, rgba(0,255,255,0.1) 30%, rgba(0,0,0,0) 60%);
    }
    .hero-portal h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(138,43,226,0.8);
    }
    .hero-portal .tagline {
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #ccc;
      margin-top: 10px;
      text-transform: uppercase;
    }

  </style>
</head>
<body>

  <!-- PHASE 1: Control Center Header -->
  <header>
    <div class="logo">
      <a href="index.html"><img src="assets/NEW%20LOGO.png" alt="XFD Logo" class="site-logo"></a>
    </div>
    
    <nav class="pill-nav">
      <a href="index.html"><i class="fas fa-newspaper"></i> NEWS</a>
      <a href="about.html"><i class="fas fa-microchip"></i> ORIGIN</a>
      <a href="designs.html"><i class="fas fa-pen-nib"></i> DESIGNS</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> CONTACT</a>
    </nav>

    <div class="header-utils">
      <div class="social-pills">
        <a href="#" class="yt"><i class="fab fa-youtube"></i></a>
        <a href="#" class="fb"><i class="fab fa-facebook"></i></a>
        <a href="#" class="tt"><i class="fab fa-tiktok"></i></a>
        <a href="#" class="ig"><i class="fab fa-instagram"></i></a>
      </div>
      <div class="search-bar">
        <input type="text" placeholder="Search the portal...">
        <i class="fas fa-search"></i>
      </div>
    </div>
  </header>

  <!-- PHASE 2: Hero Portal -->
  <main>
    <section class="hero-portal">
      <h1>XENOFINALDAWN</h1>
      <p class="tagline">One portal. Infinite possibilities.</p>
    </section>
    
    <!-- Phases 3 & 4 (Sliders and Grids) will go here next -->
  </main>

</body>
</html>
