<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XENOFINALDAWN | One Portal. Infinite Possibilities.</title>
  <meta name="description" content="One portal. Infinite possibilities. XENOFINALDAWN is the central hub for anime, horror, wrestling, tech, gaming, design, and creator commentary.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --dark: #0F0F13; --panel: #1a1a20; --panel-light: #24242c;
      --text: #ffffff; --muted: #9b9ba6;
      --horror: #39FF14; --anime: #8A2BE2; --wrestling: #DC143C; --tech: #00FFFF;
      --radius: 16px; --shadow: 0 0 25px rgba(0, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    body { background: radial-gradient(circle at top, rgba(0, 255, 255, 0.08), transparent 35%), radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.1), transparent 30%), var(--dark); color: var(--text); font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; min-height: 100vh; }
    
    header { text-align: center; padding: 48px 20px 30px; }
    .brand-kicker { color: var(--tech); letter-spacing: 4px; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
    h1 { font-size: clamp(2.4rem, 8vw, 5rem); line-height: 0.95; margin: 0; letter-spacing: 2px; text-shadow: 0 0 12px rgba(0, 255, 255, 0.35), 0 0 22px rgba(138, 43, 226, 0.25); }
    .tagline { font-style: italic; color: var(--muted); margin: 18px 0 34px; font-size: 1.05rem; }

    /* FIXED NAV GRID */
    nav { max-width: 900px; margin: 0 auto; }
    .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; list-style: none; padding: 0; margin: 0; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text); transition: 0.25s ease; }
    .nav-btn:hover { transform: translateY(-6px); filter: brightness(1.15); }
    .nav-btn img { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; border: 3px solid transparent; transition: 0.25s ease; background: #000; }
    .nav-btn span { margin-top: 12px; font-size: 0.8rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }

    /* Fixed Class Mappings */
    .nav-btn.news img { border-color: var(--tech); box-shadow: 0 0 18px var(--tech); }
    .nav-btn.origin img { border-color: var(--anime); box-shadow: 0 0 18px var(--anime); }
    .nav-btn.designs img { border-color: var(--wrestling); box-shadow: 0 0 18px var(--wrestling); }
    .nav-btn.contact img { border-color: var(--horror); box-shadow: 0 0 18px var(--horror); }

    /* Editorial & Main Styles (Kept your design) */
    main { max-width: 1100px; margin: 34px auto 70px; padding: 0 20px; }
    .section-header { margin: 48px 0 18px; display: flex; align-items: center; gap: 12px; }
    .section-subtitle { color: var(--muted); margin-top: -8px; margin-bottom: 20px; }
    .youtube-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px; }
    .video-card { background: linear-gradient(180deg, var(--panel-light), var(--panel)); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: var(--radius); overflow: hidden; }
    .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .video-content { padding: 16px; }
    .article-card { background: rgba(255,255,255,0.03); padding: 22px; margin-bottom: 20px; border-left: 5px solid; border-radius: var(--radius); }
    .horror-border { border-color: var(--horror); }
    .anime-border { border-color: var(--anime); }
    .wrestling-border { border-color: var(--wrestling); }
    .tech-border { border-color: var(--tech); }

    @media (max-width: 760px) { .nav-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <header>
    <div class="brand-kicker">Finale Boss Interface</div>
    <h1>XENOFINALDAWN</h1>
    <p class="tagline">One portal. Infinite possibilities.</p>
    <nav>
      <ul class="nav-grid">
        <li><a href="index.html" class="nav-btn news"><img src="assets/avatar.10252441.140x140.jpg" alt="News"><span>XFD News</span></a></li>
        <li><a href="about.html" class="nav-btn origin"><img src="assets/avatar.10252441.140x140.jpg" alt="Origin"><span>Origin</span></a></li>
        <li><a href="designs.html" class="nav-btn designs"><img src="assets/avatar.10252441.140x140.jpg" alt="Designs"><span>Designs</span></a></li>
        <li><a href="contact.html" class="nav-btn contact"><img src="assets/avatar.10252441.140x140.jpg" alt="Contact"><span>Contact</span></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <div class="section-header"><i class="fa-solid fa-satellite-dish"></i><h2>Automated Media Desk</h2></div>
      <div id="youtube-feed" class="youtube-grid">Loading media desk...</div>
    </section>

    <section>
      <div class="section-header"><i class="fa-solid fa-bolt"></i><h2>The Uncut Feed</h2></div>
      <article class="article-card wrestling-border"><h3>AEW Storyline Breakdown</h3><p>Uncensored thoughts...</p></article>
      <article class="article-card anime-border"><h3>Anime Debate Room</h3><p>Hot takes and legacy fights.</p></article>
    </section>
  </main>

  <script>
    async function fetchYouTubeVideos() {
      const channelId = "UCYOUR_CHANNEL_ID_HERE";
      const feed = document.getElementById("youtube-feed");
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
        const data = await res.json();
        feed.innerHTML = data.items.slice(0, 4).map(v => `
          <div class="video-card"><img src="${v.thumbnail}"><div class="video-content"><h3>${v.title}</h3><a href="${v.link}" target="_blank">Watch</a></div></div>
        `).join("");
      } catch(e) { feed.innerHTML = "Unable to load feed."; }
    }
    fetchYouTubeVideos();
  </script>
</body>
</html>
