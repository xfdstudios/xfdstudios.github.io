<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DESIGN SHOP // XENOFINALDAWN</title>
  <meta name="description" content="Browse the XFD portfolio and shop the RedBubble store.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; }

    :root { 
      --bg: #05050A; 
      --wrestling: #DC143C; /* Unified Red Theme */
      --grey-pill: rgba(255, 255, 255, 0.05);
    }
    
    body { 
      background-color: var(--bg); 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      overflow-x: hidden;
    }

    /* HEADER */
    header { padding: 20px; position: sticky; top: 0; z-index: 100; background: linear-gradient(to bottom, rgba(5,5,10,1) 40%, rgba(5,5,10,0) 100%); }
    .header-encased { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1400px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.15); border-bottom: 2px solid var(--wrestling); border-radius: 20px; padding: 10px 30px; background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(15px); }
    .site-logo { max-width: 100px; }
    .pill-nav { display: flex; gap: 15px; }
    .pill-nav a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 30px; background: var(--grey-pill); border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
    .pill-nav a.nav-designs { border-color: var(--wrestling); background: rgba(220,20,60,0.15); }
    
    /* LAYOUT */
    .shop-layout-full { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .section-title { font-size: 1.2rem; letter-spacing: 2px; margin: 40px 0 20px 0; text-transform: uppercase; color: var(--wrestling); }
    .terminal-block { background: rgba(20,20,25,0.8); border: 1px solid #333; border-left: 4px solid var(--wrestling); border-radius: 12px; padding: 30px; margin-bottom: 40px; }
    
    /* TABS */
    .tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .tab-btn { background: transparent; border: none; color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; padding: 5px; }
    .tab-btn.active { color: white; border-bottom: 3px solid var(--wrestling); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Grids */
    .grid-3x3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .item-card { background: rgba(10,10,15,0.6); border: 1px solid #222; border-radius: 10px; padding: 15px; text-align: center; }
    .item-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
    .cta-btn { display: block; background: var(--wrestling); color: white; text-decoration: none; padding: 10px; border-radius: 20px; margin-top: 10px; font-weight: bold; }
    
    /* Sliders & Footer */
    .slider-wrapper { display: flex; align-items: center; gap: 15px; }
    .nav-arrow { background: var(--grey-pill); border: 1px solid #333; color: white; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    .media-slider { display: flex; overflow-x: auto; gap: 20px; scrollbar-width: none; }
    .media-card { flex: 0 0 320px; background: rgba(10,10,15,0.6); border: 1px solid #222; border-radius: 12px; padding: 15px; }
    .site-footer { text-align: center; padding: 40px; color: #555; font-family: monospace; }
  </style>
</head>
<body>

  <header>
    <div class="header-encased">
      <div class="logo"><a href="index.html"><img src="assets/NEW%20LOGO.png" alt="XFD Logo" class="site-logo"></a></div>
      <nav class="pill-nav">
        <a href="index.html" class="nav-news">NEWS</a>
        <a href="about.html" class="nav-origin">ORIGIN</a>
        <a href="designs.html" class="nav-designs">DESIGNS</a>
        <a href="contact.html" class="nav-contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main class="shop-layout-full">
    <div class="section-title">> Quantum Archive</div>
    
    <div class="terminal-block">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-portfolio', this)">Portfolio Gallery</button>
        <button class="tab-btn" onclick="switchTab('tab-shop', this)">RedBubble Store</button>
      </div>

      <!-- PORTFOLIO -->
      <div id="tab-portfolio" class="tab-content active">
        <div class="grid-3x3">
            <div class="item-card"><img src="assets/love_bites_by_deadfantasysaga_d4jm3h5.jpg" alt="Love Bites"><h4>Love Bites</h4></div>
            <div class="item-card"><img src="assets/Horor%20its%20self.jpg" alt="Horror"><h4>Horror Itself</h4></div>
            <div class="item-card"><img src="assets/Darkness%20lighen.jpg" alt="Darkness"><h4>Darkness Lighten</h4></div>
            <div class="item-card"><img src="assets/Sea.jpg" alt="Sea"><h4>Sea</h4></div>
            <div class="item-card"><img src="assets/Packages.jpg" alt="Packages"><h4>Packages</h4></div>
            <div class="item-card"><img src="assets/girl%20with%20big%20head.jpg" alt="Girl"><h4>Girl With Big Head</h4></div>
        </div>
      </div>

      <!-- SHOP -->
      <div id="tab-shop" class="tab-content">
        <div class="grid-3x3">
            <div class="item-card"><img src="assets/kang.jpg" alt="Merch"><a href="#" class="cta-btn">View Item</a></div>
            <div class="item-card"><img src="assets/tarus.jpg" alt="Merch"><a href="#" class="cta-btn">View Item</a></div>
            <div class="item-card"><img src="assets/Betty%20Boo%20Vs.png" alt="Merch"><a href="#" class="cta-btn">View Item</a></div>
        </div>
      </div>
    </div>

    <!-- VIDEO DESIGN -->
    <div class="section-title">> Studio Feed // Video Design</div>
    <div class="terminal-block">
      <div class="slider-wrapper">
        <button class="nav-arrow" onclick="document.getElementById('youtube-feed').scrollBy(-340,0)"><i class="fas fa-chevron-left"></i></button>
        <div class="media-slider" id="youtube-feed">
             <p>Loading studio production logs...</p>
        </div>
        <button class="nav-arrow" onclick="document.getElementById('youtube-feed').scrollBy(340,0)"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
  </main>

  <footer class="site-footer">&copy; 2026 XenoFinalDawn.</footer>

  <script>
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
