<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anime Portal - XFD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="page-news portal-story-page" data-portal="anime">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="XenoFinalDawn home">
        <img src="https://xfdzone.github.io/xfdportal/assets/NEW%20LOGO.png" alt="XFD logo">
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html"><i class="fa-solid fa-newspaper" aria-hidden="true"></i>Feed</a>
        <a href="about.html"><i class="fa-solid fa-microchip" aria-hidden="true"></i>Origin</a>
        <a href="designs.html"><i class="fa-solid fa-pen-nib" aria-hidden="true"></i>Designs</a>
        <a href="contact.html"><i class="fa-solid fa-envelope" aria-hidden="true"></i>Contact</a>
      </nav>
      <div class="header-actions">
        <div class="social-links" aria-label="Social links">
          <a href="https://www.youtube.com/@Xenofinaldawn" aria-label="YouTube">
            <i class="fa-brands fa-youtube" aria-hidden="true"></i>
          </a>
          <a href="https://www.facebook.com/XFDTV/" aria-label="Facebook">
            <i class="fa-brands fa-facebook" aria-hidden="true"></i>
          </a>
          <a href="https://www.tiktok.com/@xenofinaldawn" aria-label="TikTok">
            <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
          </a>
          <a href="https://www.instagram.com/xenofinaldawn/" aria-label="Instagram">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          </a>
          <a href="https://www.redbubble.com/people/Gr3at1/shop?asc=u" aria-label="Shop">
            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
          </a>
        </div>
        <label class="search-shell">
          <span class="sr-only">Search transmissions</span>
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="search" placeholder="Search portal">
        </label>
      </div>
    </header>
    <main class="portal-main">
      <section class="portal-hero section-banner portal-banner">
        <div class="portal-page-icon" aria-hidden="true"><i class="fa-solid fa-eye"></i></div>
        <p class="eyebrow" id="portal-label">Portal</p>
        <h1 id="portal-title">Portal</h1>
        <p id="portal-tagline"></p>
      </section>
      <section class="story-layout">
        <div>
          <p class="eyebrow">Latest entries</p>
          <div id="latest-stories" class="story-grid"></div>
        </div>
        <aside class="archive-panel">
          <p class="eyebrow">Archive</p>
          <ul id="archive-stories"></ul>
        </aside>
      </section>
    </main>
    <footer class="site-footer">
      <span>// system_active //</span>
      <p>© 2026 XenoFinalDawn (XFD). All rights reserved.</p>
    </footer>
    <script src="portal-page.js"></script>
  </body>
</html>
